<main>



    <h1>Contact Me</h1>



    <p>
        Feel free to contact me regarding professional opportunities,
        projects, or questions about my work.
    </p>





    <form>



        <label for="title">
            Title:
        </label>


        <select id="title" name="title" required>


            <option value="">
                Select Title
            </option>


            <option value="mr">
                Mr.
            </option>


            <option value="ms">
                Ms.
            </option>


            <option value="dr">
                Dr.
            </option>


        </select>






        <label for="name">
            Full Name:
        </label>


        <input 
            type="text"
            id="name"
            name="name"
            placeholder="Enter your full name"
            required>






        <label for="email">
            Email Address:
        </label>


        <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email address"
            required>






        <label for="topic">
            Select Topic:
        </label>


        <select id="topic" name="topic" required>


            <option value="">
                Choose a topic
            </option>


            <option value="job">
                Job Opportunity
            </option>


            <option value="project">
                Project Discussion
            </option>


            <option value="question">
                General Question
            </option>


        </select>






        <label for="message">
            Message:
        </label>


        <textarea
            id="message"
            name="message"
            placeholder="Enter your message"
            required></textarea>






        <button type="submit">
            Submit
        </button>



    </form>
