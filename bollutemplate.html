<html lang="en">

<head>
  <!-- Character encoding ensures special characters display correctly -->
  <meta charset="utf-8">

  <!-- Viewport meta tag makes the page mobile-friendly / responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Title shown in the browser tab -->
  <title>My Starter Template</title>

  <!-- Link to external CSS for styling -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ============================
       HEADER
       Will later contain logo and navigation
       ============================ -->
  <header>
    <!-- Content will go here -->
  </header>

  <!-- ============================
       MAIN CONTENT
       Primary page content goes here
       ============================ -->
  <main>
    <!-- Sample heading for visual testing -->
    <h1>Hello, world!</h1>
  </main>

  <!-- ============================
       FOOTER
       Contains name and current date
       ============================ -->
  <footer>
    <p>Pranaya Bollu &mdash; June 20, 2026</p>
  </footer>

</body>

</html>
